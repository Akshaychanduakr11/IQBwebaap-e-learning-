<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ACCESS CHECK -->
<script>
const raw = localStorage.getItem("user");

let uid = null;

try {
  uid = JSON.parse(raw).uid;
} catch {
  uid = raw;
}

const ADMIN_UID = "IYmFy1KsG1bPvLksiiRZ1tYhoii1";

if (!uid || uid !== ADMIN_UID) {
  alert("Access Denied");
  window.location.href = "index.html";
}
</script>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚙️ Admin Panel</h2>

  <button onclick="showSection('add')">➕ Add Post</button>
  <button onclick="showSection('view')">📄 View Posts</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- ADD -->
  <div id="addSection" class="section">
    <h2>Create Post</h2>

    <input id="title" placeholder="Enter Title">
    <textarea id="content" placeholder="Enter Content"></textarea>

    <button onclick="addPost()">Publish</button>
  </div>

  <!-- VIEW -->
  <div id="viewSection" class="section hidden">
    <h2>All Posts</h2>
    <div id="dataList"></div>
  </div>

</div>

<script>
function showSection(section) {
  document.getElementById("addSection").classList.add("hidden");
  document.getElementById("viewSection").classList.add("hidden");

  if (section === "add") {
    document.getElementById("addSection").classList.remove("hidden");
  } else {
    document.getElementById("viewSection").classList.remove("hidden");

    // 🔥 ADD THIS LINE
    if (window.loadData) loadData();
  }
}

function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

<script type="module" src="js/admin.js"></script>

</body>
</html>
